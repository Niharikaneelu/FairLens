<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairLens · AI-Powered Bias Detection</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --bg-dark: #0A0F1C;
      --bg-card: rgba(15, 23, 42, 0.75);
      --text-white: #FFFFFF;
      --text-muted: #94A3B8;
      --border-light: rgba(255, 255, 255, 0.08);
      --success: #10B981;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      color: var(--text-white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Glow background */
    .bg-glow {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .bg-glow::before,
    .bg-glow::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }

    .bg-glow::before {
      width: 400px;
      height: 400px;
      background: rgba(99, 102, 241, 0.3);
      top: -100px;
      left: -100px;
      animation: float 20s infinite;
    }

    .bg-glow::after {
      width: 500px;
      height: 500px;
      background: rgba(139, 92, 246, 0.2);
      bottom: -150px;
      right: -150px;
      animation: float 25s infinite reverse;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(40px, 30px);
      }
    }

    /* Navbar */
    .navbar {
      backdrop-filter: blur(20px);
      background: rgba(10, 15, 28, 0.7);
      border-bottom: 1px solid var(--border-light);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-inner {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #A5B4FC, #C084FC, #F0ABFC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Container */
    .container {
      max-width: 600px;
      margin: auto;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 2;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      background: linear-gradient(#fff, #A5B4FC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--text-muted);
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 2rem;
      padding: 2rem;
      backdrop-filter: blur(20px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Dropzone */
    .dropzone {
      border: 2px dashed rgba(165, 180, 252, 0.4);
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      margin-bottom: 1.5rem;
    }

    .file-name {
      margin-top: 10px;
      color: var(--success);
    }

    /* Inputs */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-control {
      width: 100%;
      padding: 0.9rem;
      border-radius: 1rem;
      border: 1px solid var(--border-light);
      background: rgba(0, 0, 0, 0.4);
      color: white;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* Button */
    .btn-submit {
      width: 100%;
      padding: 1rem;
      border-radius: 1rem;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
    }

    /* Error */
    .error {
      color: #EF4444;
      margin-bottom: 1rem;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <div class="logo">FairLens</div>
    </div>
  </nav>

  <div class="container">

    <div class="hero">
      <h1>Detect AI Bias</h1>
      <p>Upload your dataset and analyze fairness instantly</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="card">
      <form id="auditForm" action="/analyze" method="POST" enctype="multipart/form-data">

        <div class="dropzone" onclick="fileInput.click()" id="dropzone">
          <p>📂 Drag & Drop CSV or Click</p>
          <div id="fileDisplay" class="file-name"></div>
          <input type="file" id="fileInput" name="file" accept=".csv" hidden required>
        </div>

        <div class="form-group">
          <input type="text" name="target" class="form-control" placeholder="Target Column" required>
        </div>

        <div class="form-group">
          <input type="text" name="sensitive" class="form-control" placeholder="Sensitive Column" required>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">✨ Analyze</button>

      </form>
    </div>

  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileDisplay = document.getElementById('fileDisplay');
    const dropzone = document.getElementById('dropzone');
    const form = document.getElementById('auditForm');
    const btn = document.getElementById('submitBtn');

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) {
        fileDisplay.innerText = "📄 " + fileInput.files[0].name;
      }
    });

    // Drag & drop
    dropzone.addEventListener('dragover', e => {
      e.preventDefault();
      dropzone.style.borderColor = "#6366F1";
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.style.borderColor = "rgba(165,180,252,0.4)";
    });

    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      fileInput.files = e.dataTransfer.files;
      fileDisplay.innerText = "📄 " + e.dataTransfer.files[0].name;
    });

    // Submit loading state
    form.addEventListener('submit', () => {
      btn.innerText = "🔍 Analyzing...";
      btn.disabled = true;
    });
  </script>

</body>

</html>
