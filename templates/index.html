<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairLens · Bias Detection Dashboard</title>

  <style>
    /* ---- KEEP ALL YOUR ORIGINAL CSS ---- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui;
      background: #f5f7fb;
      color: #1e293b;
    }

    .container {
      max-width: 1280px;
      margin: auto;
      padding: 0 2rem;
    }

    .navbar {
      background: #fff;
      border-bottom: 1px solid #e9eef3;
      padding: 1rem;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
    }

    .logo {
      font-weight: 700;
      font-size: 1.5rem;
    }

    .main-content {
      padding: 3rem 0;
    }

    .hero-center {
      text-align: center;
      margin-bottom: 2rem;
    }

    .upload-card {
      background: #fff;
      border-radius: 2rem;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }

    .dropzone {
      border: 2px dashed #cbdde9;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      margin-top: 15px;
    }

    .steps-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 2rem;
    }

    .step {
      background: white;
      padding: 1rem;
      border-radius: 1rem;
    }

    .footer {
      margin-top: 3rem;
      padding: 1rem;
      text-align: center;
      background: #fff;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="container nav-inner">
      <div class="logo">FairLens</div>
      <div>Methodology | Support</div>
    </div>
  </div>

  <main class="main-content">
    <div class="container">

      <div class="hero-center">
        <h1>FairLens</h1>
        <p>Upload your dataset to detect bias in decisions.</p>
      </div>

      <form>
        <div class="upload-card">

          <div class="dropzone" onclick="fileInput.click()">
            <p>Drag & drop CSV file</p>
            <input type="file" id="fileInput" style="display:none">
          </div>

          <button type="button" class="btn-primary" onclick="goToResult()">Analyze Dataset</button>

        </div>
      </form>

      <div class="steps-grid">
        <div class="step">Upload</div>
        <div class="step">Process</div>
        <div class="step">Act</div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>© FairLens</p>
  </footer>

  <script>
    function goToResult() {
      window.location.href = "result.html";
    }
  </script>

</body>

</html>
